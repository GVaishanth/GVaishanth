<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="fnTitle">
  <title id="fnTitle">Field notes — seven engineering lessons recovered from four complete builds</title>

  <!-- Background -->
  <rect width="1200" height="520" fill="#0b0d11"/>

  <!-- Header bar -->
  <rect width="1200" height="44" fill="#0d1117"/>
  <line x1="0" y1="44" x2="1200" y2="44" stroke="#1a2030" stroke-width="1"/>
  <text x="32" y="27" fill="#3a4a5a" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9" letter-spacing="3">FIELD NOTES</text>
  <text x="1168" y="27" fill="#2a3545" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9" text-anchor="end" letter-spacing="2">7 ENTRIES · v1→v4 · 4 REPOS</text>

  <!-- Grid structure — column and row dividers -->
  <line x1="400" y1="44" x2="400" y2="286" stroke="#131820" stroke-width="1"/>
  <line x1="800" y1="44" x2="800" y2="286" stroke="#131820" stroke-width="1"/>
  <line x1="0"   y1="286" x2="1200" y2="286" stroke="#131820" stroke-width="1"/>
  <line x1="600" y1="286" x2="600"  y2="470" stroke="#131820" stroke-width="1"/>
  <line x1="0"   y1="470" x2="1200" y2="470" stroke="#131820" stroke-width="1"/>

  <!-- Footer band -->
  <rect x="0" y="470" width="1200" height="50" fill="#0d1117"/>

  <!-- ═══════════════════════════════════════════
       ENTRY 01 — top-left
       Reveals at t=0.3s
  ════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <text x="32" y="80" fill="#2a3545" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="8" letter-spacing="2">ENTRY 01 · MULTIPLAYER</text>
    <text x="32" y="104" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Multiplayer is a state machine</text>
    <text x="32" y="120" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">problem, not a networking one.</text>
    <text x="32" y="148" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Host-authority + 1s broadcast.</text>
    <text x="32" y="165" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Boring engineering. It works.</text>
    <text x="32" y="182" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Clever prediction without</text>
    <text x="32" y="199" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">authority drifts.</text>
    <text x="32" y="260" fill="#1a2a3a" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9">← Velocity · v2 → v3</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ENTRY 02 — top-centre
       Reveals at t=0.7s
  ════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <text x="432" y="80" fill="#2a3545" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="8" letter-spacing="2">ENTRY 02 · RESILIENCE</text>
    <text x="432" y="104" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Checkpoint before you</text>
    <text x="432" y="120" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">need to recover.</text>
    <text x="432" y="148" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Assume the process dies at</text>
    <text x="432" y="165" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">the worst moment. Monitor</text>
    <text x="432" y="182" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">continuously. Save atomically.</text>
    <text x="432" y="199" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">If you can't resume, you</text>
    <text x="432" y="216" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">didn't finish.</text>
    <text x="432" y="260" fill="#1a2a3a" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9">← CRPapp · v1</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ENTRY 03 — top-right
       Reveals at t=1.1s
  ════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
    <text x="832" y="80" fill="#2a3545" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="8" letter-spacing="2">ENTRY 03 · GAME FEEL</text>
    <text x="832" y="104" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Frame budget. Then input.</text>
    <text x="832" y="120" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Then feedback. That order.</text>
    <text x="832" y="148" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">60fps non-negotiable. Then</text>
    <text x="832" y="165" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">input response. Then sound</text>
    <text x="832" y="182" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">and visuals. Without feedback</text>
    <text x="832" y="199" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">a number game feels dead.</text>
    <text x="832" y="260" fill="#1a2a3a" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9">← Cricket · v1 → v3</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ENTRY 04 — bottom-left (wide)
       Reveals at t=1.5s
  ════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <text x="32" y="318" fill="#2a3545" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="8" letter-spacing="2">ENTRY 04 · DESIGN</text>
    <text x="32" y="342" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Change one rule. Don't explain it.</text>
    <text x="32" y="358" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Watch the decision tree reorganize.</text>
    <text x="32" y="386" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Seven cricket modes because "same number = out"</text>
    <text x="32" y="403" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">gets boring fast. Players figure it out in three</text>
    <text x="32" y="420" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">rounds. They teach themselves.</text>
    <text x="32" y="455" fill="#1a2a3a" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9">← Cricket · v2</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ENTRY 05 — bottom-right
       Reveals at t=1.9s
  ════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.9s" fill="freeze"/>
    <text x="632" y="318" fill="#2a3545" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="8" letter-spacing="2">ENTRY 05 · TOOLING</text>
    <text x="632" y="342" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">Vanilla goes further</text>
    <text x="632" y="358" fill="#ff3340" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" font-weight="700">than people admit.</text>
    <text x="632" y="386" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Velocity: 52 ES6 modules,</text>
    <text x="632" y="403" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">no bundler, 60fps on a phone.</text>
    <text x="632" y="420" fill="#3a4a5a" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="10">Cricket: ~99 KB over WebRTC.</text>
    <text x="632" y="455" fill="#1a2a3a" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9">← Velocity + Cricket · all versions</text>
  </g>

  <!-- ═══════════════════════════════════════════
       ENTRIES 06 + 07 — footer row (compact)
       Reveals at t=2.3s
  ════════════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.3s" fill="freeze"/>
    <!-- Entry 06 -->
    <text x="32" y="494" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace">
      <tspan fill="#2a3545" font-size="8" letter-spacing="2">06</tspan>
      <tspan fill="#ff3340" font-size="10" font-weight="700" dx="12">If it looks like a broadcast, people trust it.</tspan>
      <tspan fill="#3a4050" font-size="10" dx="8">Telemetry panels aren't decoration — they're comprehension.</tspan>
    </text>
    <!-- Entry 07 -->
    <text x="32" y="512" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace">
      <tspan fill="#2a3545" font-size="8" letter-spacing="2">07</tspan>
      <tspan fill="#ff3340" font-size="10" font-weight="700" dx="12">Version four is the first you'd have built if you'd known.</tspan>
      <tspan fill="#3a4050" font-size="10" dx="8">You can't refactor toward an architecture you can't see yet.</tspan>
    </text>
  </g>

</svg>
