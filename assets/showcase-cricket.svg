<svg xmlns="http://www.w3.org/2000/svg" width="800" height="720" viewBox="0 0 800 720" role="img" aria-labelledby="svgTitle">
  <title id="svgTitle">Computer Cricket — Hand Cricket Club Simulator</title>
  <defs>
    <!-- FIXED: feDropShadow replaced with GitHub-compatible shadow chain -->
    <filter id="sh" x="-5%" y="-5%" width="115%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <clipPath id="cv"><rect x="48" y="128" width="704" height="280" rx="14"/></clipPath>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <!-- Grid pattern for cover area -->
    <pattern id="cgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0L0 0 0 48" fill="none" stroke="#0d1a10" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- card body -->
  <rect width="800" height="720" rx="22" fill="#0d1117"/>
  <rect x=".5" y=".5" width="799" height="719" rx="22" fill="none" stroke="#1c212d" stroke-width="1"/>

  <!-- ═══════ STATUS BAR ═══════ -->
  <circle cx="56" cy="38" r="4.5" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="72" y="42" fill="#22c55e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10" font-weight="600" letter-spacing="2">ACTIVE</text>
  <text x="752" y="42" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10" text-anchor="end">v3 · 2026</text>

  <!-- ═══════ TITLE ═══════ -->
  <text x="48" y="88" fill="#e6edf3" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5">Computer Cricket</text>
  <text x="48" y="114" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="15">Hand Cricket Club — Number-Based Simulation</text>

  <!-- ═══════ COVER PANEL — FIXED: no external image, pure SVG ═══════ -->
  <g clip-path="url(#cv)">
    <!-- Base dark background — slightly green-tinted for cricket identity -->
    <rect x="48" y="128" width="704" height="280" fill="#0a0e0b"/>
    <!-- Engineering grid -->
    <rect x="48" y="128" width="704" height="280" fill="url(#cgrid)"/>
    <!-- Green accent top bar -->
    <rect x="48" y="128" width="704" height="3" fill="#22c55e" opacity="0.8"/>
    <!-- Column rules -->
    <line x1="48" y1="200" x2="752" y2="200" stroke="#0d1a10" stroke-width="1"/>
    <line x1="48" y1="272" x2="752" y2="272" stroke="#0d1a10" stroke-width="1"/>
    <line x1="48" y1="344" x2="752" y2="344" stroke="#0d1a10" stroke-width="1"/>
    <line x1="240" y1="128" x2="240" y2="408" stroke="#0d1a10" stroke-width="1"/>
    <line x1="512" y1="128" x2="512" y2="408" stroke="#0d1a10" stroke-width="1"/>
    <!-- Centre watermark -->
    <text x="400" y="240" text-anchor="middle" fill="#0f1f12" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="72" font-weight="700" letter-spacing="-2">CKT</text>
    <!-- Stat overlays — top row -->
    <text x="144" y="180" text-anchor="middle" fill="#1a3a1e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9" letter-spacing="2">GAME MODES</text>
    <text x="144" y="230" text-anchor="middle" fill="#22c55e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="36" font-weight="700">7</text>
    <text x="400" y="180" text-anchor="middle" fill="#1a3a1e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9" letter-spacing="2">MAX PLAYERS</text>
    <text x="400" y="230" text-anchor="middle" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="36" font-weight="700">12</text>
    <text x="624" y="180" text-anchor="middle" fill="#1a3a1e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9" letter-spacing="2">DEPENDENCIES</text>
    <text x="624" y="230" text-anchor="middle" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="36" font-weight="700">0</text>
    <!-- Bottom row -->
    <text x="144" y="302" text-anchor="middle" fill="#1a3a1e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9" letter-spacing="2">FUNCTIONS</text>
    <text x="144" y="345" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="28" font-weight="600">91</text>
    <text x="400" y="302" text-anchor="middle" fill="#1a3a1e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9" letter-spacing="2">BUNDLE SIZE</text>
    <text x="400" y="345" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="28" font-weight="600">99KB</text>
    <text x="624" y="302" text-anchor="middle" fill="#1a3a1e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9" letter-spacing="2">TRANSPORT</text>
    <text x="624" y="345" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="28" font-weight="600">P2P</text>
    <!-- Animated score ticker line -->
    <polyline points="48,390 100,382 160,388 220,376 280,384 340,371 400,379 460,366 520,374 580,361 640,370 700,358 752,364"
      fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"
      stroke-dasharray="900" stroke-dashoffset="900">
      <animate attributeName="stroke-dashoffset" values="900;0" dur="2.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </polyline>
  </g>
  <rect x="48" y="128" width="704" height="280" rx="14" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- ═══════ COMPLEXITY METER ═══════ -->
  <text x="48" y="442" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">COMPLEXITY</text>
  <rect x="48" y="452" width="32" height="5" rx="2.5" fill="#22c55e"/>
  <rect x="84" y="452" width="32" height="5" rx="2.5" fill="#22c55e"/>
  <rect x="120" y="452" width="32" height="5" rx="2.5" fill="#22c55e"/>
  <rect x="156" y="452" width="32" height="5" rx="2.5" fill="#1c212d"/>
  <rect x="192" y="452" width="32" height="5" rx="2.5" fill="#1c212d"/>
  <text x="236" y="457" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10">3 / 5 · Intermediate</text>

  <!-- ═══════ TECHNOLOGIES ═══════ -->
  <text x="48" y="486" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">TECHNOLOGIES</text>
  <rect x="48" y="496" width="56" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
  <text x="76" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">Python</text>
  <rect x="110" y="496" width="76" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
  <text x="148" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">JavaScript</text>
  <rect x="192" y="496" width="60" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
  <text x="222" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">PeerJS</text>
  <rect x="258" y="496" width="60" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
  <text x="288" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">WebRTC</text>
  <rect x="324" y="496" width="48" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
  <text x="348" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">HTML5</text>

  <!-- ═══════ ARCHITECTURE ═══════ -->
  <text x="48" y="546" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">ARCHITECTURE</text>
  <text x="48" y="564" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12">3 forms: CLI · Single-player web · Multiplayer tournament · 7 rule modes</text>

  <!-- ═══════ STATS ROW ═══════ -->
  <line x1="48" y1="584" x2="752" y2="584" stroke="#1c212d" stroke-width="0.5"/>
  <g font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10" fill="#6e7681">
    <text x="48" y="604">Difficulty: Medium</text>
    <text x="210" y="604">91 functions</text>
    <text x="344" y="604">~99 KB</text>
    <text x="450" y="604">7 modes</text>
    <text x="550" y="604">0 deps</text>
    <text x="660" y="604" text-anchor="end">~120 hrs</text>
  </g>

  <!-- ═══════ INTERESTING FACTS ═══════ -->
  <text x="48" y="634" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">DID YOU KNOW</text>
  <text x="48" y="652" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12"><tspan fill="#22c55e">●</tspan> In "Crazy" mode, matching numbers square your score — not just "out"</text>
  <text x="48" y="670" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12"><tspan fill="#22c55e">●</tspan> IPL-style leagues with team drafts, live spectating, and 30-match history</text>
  <text x="48" y="688" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12"><tspan fill="#22c55e">●</tspan> Luck quiz nudges toss outcomes based on your answer patterns</text>

  <!-- ═══════ ACTION BUTTONS — FIXED: no target="_blank", no filter on buttons ═══════ -->
  <rect x="540" y="664" width="90" height="30" rx="15" fill="#22c55e"/>
  <text x="585" y="683" fill="#fff" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10.5" text-anchor="middle" font-weight="600">PLAY →</text>
  <rect x="642" y="664" width="100" height="30" rx="15" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
  <text x="692" y="683" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10.5" text-anchor="middle">GITHUB →</text>
</svg>
