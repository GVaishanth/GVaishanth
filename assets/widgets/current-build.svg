<svg xmlns="http://www.w3.org/2000/svg" width="720" height="110" viewBox="0 0 720 110" role="img" aria-label="Current build: GroupDNA">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@500;600;700&display=swap');</style>
  </defs>
  <rect width="720" height="110" rx="14" fill="#11151c"/>
  <rect x="0.5" y="0.5" width="719" height="109" rx="14" fill="none" stroke="#232837"/>
  <!-- accent rail -->
  <rect x="0" y="0" width="3.5" height="110" rx="14" fill="#ff3340"/>
  <!-- label -->
  <text x="28" y="36" fill="#7a808c" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5" letter-spacing="1.2">CURRENT BUILD</text>
  <!-- repo name -->
  <text x="28" y="64" fill="#e6e6e6" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="20" font-weight="650" letter-spacing="-0.2">GroupDNA</text>
  <!-- description -->
  <text x="28" y="86" fill="#8b8f98" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12.5">No description</text>
  <!-- right meta -->
  <g font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" fill="#8b8f98" text-anchor="end">
    <text x="692" y="38"><tspan fill="#ff3340">●</tspan> LIVE</text>
    <text x="692" y="62"><tspan fill="#9aa0a6">●</tspan> Jupyter Notebook</text>
    <text x="692" y="86" fill="#6b7080">updated 3d ago</text>
  </g>
  <!-- live pulse – subtle -->
  <circle cx="680" cy="32" r="2" fill="#ff3340" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.35;0.9" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>