<svg xmlns="http://www.w3.org/2000/svg" width="720" height="120" viewBox="0 0 720 120" role="img">
  <rect width="720" height="120" rx="14" fill="#11151c"/>
  <rect x=".5" y=".5" width="719" height="119" rx="14" fill="none" stroke="#1c212d"/>
  
    <defs>
    <clipPath id="cb-clip"><rect width="720" height="120" rx="14"/></clipPath>
  </defs>
  <!-- Red left accent bar, clipped to card boundary -->
  <g clip-path="url(#cb-clip)">
    <rect x="0" y="0" width="4" height="120" fill="#ff3340"/>
  </g>
  <text x="32" y="32" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10" letter-spacing="2">CURRENT BUILD</text>
  <text x="32" y="58" fill="#e6edf3" font-family="'Inter','SF Pro Display',system-ui,-apple-system,sans-serif" font-size="22" font-weight="650">SpendDNA</text>
  <text x="32" y="78" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,-apple-system,sans-serif" font-size="13">Open source · Learning</text>
  <g font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="11" fill="#8b949e" text-anchor="end">
    <text x="692" y="38"><tspan fill="#ff3340">●</tspan> ACTIVE</text>
    <text x="692" y="58"><tspan fill="#6e7681">●</tspan> Jupyter Notebook</text>
    <text x="692" y="78" fill="#484f58">updated 2d ago</text>
  </g>
  <!-- heartbeat pulse: 1.8s cycle -->
  <circle cx="682" cy="34" r="2.5" fill="#ff3340" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>