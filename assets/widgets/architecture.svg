<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240" role="img">
  <rect width="720" height="240" rx="14" fill="#11151c"/>
  <rect x=".5" y=".5" width="719" height="239" rx="14" fill="none" stroke="#1c212d"/>
  
  <text x="28" y="26" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10" letter-spacing="2">ARCHITECTURE — VELOCITY</text>
  <text x="692" y="26" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="9" text-anchor="end">ES6 · 22 modules · 52 files</text>
  <defs>
    <!-- Single closed subpath — animateMotion orbits all 4 edges -->
    <path id="arch-path" d="M 146,76 L 306,76 L 306,166 L 146,166 Z"/>
  </defs>
  <g>
        <line x1="146" y1="76" x2="306" y2="76" stroke="#1c212d" stroke-width="1.2"/>
    <line x1="306" y1="76" x2="306" y2="166" stroke="#1c212d" stroke-width="1.2"/>
    <line x1="306" y1="166" x2="146" y2="166" stroke="#1c212d" stroke-width="1.2"/>
    <line x1="146" y1="166" x2="146" y2="76" stroke="#1c212d" stroke-width="1.2"/>
    <rect x="100" y="61" width="92" height="30" rx="8" fill="#0b0d11" stroke="#1c212d" stroke-width="1"/>
    <text x="146" y="80" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">CORE</text>
    <rect x="260" y="61" width="92" height="30" rx="8" fill="#0b0d11" stroke="#1c212d" stroke-width="1"/>
    <text x="306" y="80" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">RENDER</text>
    <rect x="100" y="151" width="92" height="30" rx="8" fill="#0b0d11" stroke="#1c212d" stroke-width="1"/>
    <text x="146" y="170" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">NETWORK</text>
    <rect x="260" y="151" width="92" height="30" rx="8" fill="#0b0d11" stroke="#1c212d" stroke-width="1"/>
    <text x="306" y="170" text-anchor="middle" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">SIM</text>

    <!-- two data packets orbit the loop, offset by 2.2s (half of 4.4s) -->
    <circle r="2.5" fill="#ff3340">
      <animateMotion dur="4.4s" repeatCount="indefinite" rotate="auto">
        <mpath href="#arch-path"/>
      </animateMotion>
    </circle>
    <circle r="2.5" fill="#ff3340" opacity="0.7">
      <animateMotion dur="4.4s" repeatCount="indefinite" rotate="auto" begin="2.2s">
        <mpath href="#arch-path"/>
      </animateMotion>
    </circle>
  </g>
      <text x="420" y="84" fill="#6e7681" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">Canvas · 60 fps</text>
    <text x="420" y="106" fill="#6e7681" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">Physics · 120 Hz</text>
    <text x="420" y="128" fill="#6e7681" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">WebRTC · P2P</text>
    <text x="420" y="150" fill="#6e7681" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="10.5">Memory · &lt; 45MB</text>

  <text x="692" y="230" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,ui-monospace,monospace" font-size="8" text-anchor="end">data flow — live system map</text>
</svg>