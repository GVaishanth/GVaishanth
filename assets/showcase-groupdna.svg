<svg xmlns="http://www.w3.org/2000/svg" width="800" height="720" viewBox="0 0 800 720" role="img" aria-labelledby="svgTitle">
  <title id="svgTitle">GroupDNA — WhatsApp Chat Analyzer</title>
  <defs>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <clipPath id="cv"><rect x="48" y="128" width="704" height="280" rx="14"/></clipPath>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="720" rx="22" fill="#0d1117"/>
  <rect x=".5" y=".5" width="799" height="719" rx="22" fill="none" stroke="#1c212d" stroke-width="1"/>
  <circle cx="56" cy="38" r="4.5" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
  <text x="72" y="42" fill="#22c55e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10" font-weight="600" letter-spacing="2">ACTIVE</text>
  <text x="752" y="42" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10" text-anchor="end">v1 · 2026</text>
  <text x="48" y="88" fill="#e6edf3" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5">GroupDNA</text>
  <text x="48" y="114" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="15">WhatsApp Chat Analyzer — "Spotify Wrapped for your Group"</text>
