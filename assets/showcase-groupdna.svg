  <rect x="48" y="128" width="704" height="280" rx="14" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="48" y="442" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">COMPLEXITY</text>
  <rect x="48" y="452" width="32" height="5" rx="2.5" fill="#f97316"/>
  <rect x="84" y="452" width="32" height="5" rx="2.5" fill="#f97316"/>
  <rect x="120" y="452" width="32" height="5" rx="2.5" fill="#f97316"/>
  <rect x="156" y="452" width="32" height="5" rx="2.5" fill="#1c212d"/>
  <rect x="192" y="452" width="32" height="5" rx="2.5" fill="#1c212d"/>
  <text x="236" y="457" fill="#8b949e" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10">3 / 5 · Intermediate</text>
  <text x="48" y="486" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">TECHNOLOGIES</text>
  <rect x="48" y="496" width="56" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/><text x="76" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">Python</text>
  <rect x="110" y="496" width="56" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/><text x="138" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">NumPy</text>
  <rect x="172" y="496" width="48" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/><text x="196" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">JSON</text>
  <rect x="226" y="496" width="60" height="22" rx="11" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/><text x="256" y="511" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="9.5" text-anchor="middle">Chat Logs</text>
  <text x="48" y="546" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">ARCHITECTURE</text>
  <text x="48" y="564" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12">Message pattern analysis · Response time distribution · Silent streak detection · Personality archetypes</text>
  <line x1="48" y1="584" x2="752" y2="584" stroke="#1c212d" stroke-width="0.5"/>
  <g font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10" fill="#6e7681">
    <text x="48" y="604">Difficulty: Medium</text>
    <text x="210" y="604">~400 lines</text>
    <text x="340" y="604">Python</text>
    <text x="440" y="604">Patterns</text>
    <text x="550" y="604">0 deps</text>
    <text x="660" y="604" text-anchor="end">~30 hrs</text>
  </g>
  <text x="48" y="634" fill="#484f58" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="8" letter-spacing="2.5">DID YOU KNOW</text>
  <text x="48" y="652" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12"><tspan fill="#f97316">●</tspan> "Spotify Wrapped for your WhatsApp group" — message patterns, response times, archetypes</text>
  <text x="48" y="670" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12"><tspan fill="#f97316">●</tspan> Detects silent streaks and personality archetypes from chat behavior</text>
  <text x="48" y="688" fill="#8b949e" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="12"><tspan fill="#f97316">●</tspan> Takes messy real-world WhatsApp exports, turns them into shareable insights</text>
  <a href="https://github.com/GVaishanth/GroupDNA" target="_blank">
    <rect x="642" y="664" width="100" height="30" rx="15" fill="#1c212d" stroke="#2a303c" stroke-width="0.5"/>
    <text x="692" y="683" fill="#e6edf3" font-family="'JetBrains Mono','SF Mono',Consolas,monospace" font-size="10.5" text-anchor="middle">GITHUB →</text>
